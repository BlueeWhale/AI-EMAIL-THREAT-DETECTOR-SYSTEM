<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="image/LOGO.png" type="image/png">
    <title>Dashboard Login</title>
</head>
<body>
   <div class="login-container">
       <h1>Login </h1>
         <form action="" class="login-form">
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">X
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle-password" data-target="password">👁</span>
            </div>
            <div class="remember">
                <label><input type="checkbox"> Remember me</label>
            </div>
            <button type="submit" class="btn">Login</button>
         </form>
   <p class="paragraph">Or</p>
   
   <div class="google_facebook">
    <button class="google-btn">
        <img src="image/google.svg" alt="Google Icon" class="icon">

    </button>
    <button class="facebook-btn">
        <img src="image/facebook.svg" alt="Facebook Icon" class="icon">
        
    </button>
   </div>
  <div class="signup">
    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
   <div class="forget-password">
        <p>Forgot your password? <a href="forget_password.html">Click here</a></p>
</div>
   </div>
   <script src="script.js"></script>
</body>
</html>
