<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="image/LOGO.png" type="image/png">
    <title>Sign Up</title>
</head>
<body>
    <div class="signup-container">
        <form action="" class="signup-form">
            <h1>Sign Up</h1>
            <div class="input-box">
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle-password" data-target="password">👁</span>
            </div>
            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <span class="toggle-password" data-target="confirmPassword">👁</span>
            </div>
            <div class="strength-container">
    <div class="strength-bar" id="strength-bar"></div>
</div>
<p id="strength-text"></p>
            <button type="submit"class="btn">Sign Up</button>
        </form>
        <div class="login-link">
            <p>Already have an account? <a href="index.html">Login here</a></p>
        </div>
          <div class="google_facebook">
    <button class="google-btn">
        <img src="image/google.svg" alt="Google Icon" class="icon">

    </button>
    <button class="facebook-btn">
        <img src="image/facebook.svg" alt="Facebook Icon" class="icon">
        
    </button>
   </div>
    </div>
<script src="script.js"></script>
</body>
</html>
